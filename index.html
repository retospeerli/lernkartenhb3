<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAKOM HB3 Lernkarten</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>BAKOM HB3 Lernkarten</h1>
        <p class="subtitle">Alle HB3-MC-Fragen als Lernkarten mit Lernmodus</p>
      </div>
      <button id="homeBtn" class="ghost" hidden>⌂ Hauptmenü</button>
    </header>

    <main>
      <section id="menuView" class="view active">
        <div class="panel intro">
          <h2>Themenübersicht</h2>
          <p>Wähle ein Thema aus dem Inhaltsverzeichnis. Danach kannst du die Karten umdrehen, blättern und jede Karte als <strong>gewusst</strong> oder <strong>noch üben</strong> markieren.</p>
        </div>
        <div id="topicGrid" class="topicGrid"></div>
      </section>

      <section id="cardsView" class="view">
        <div class="chapterHead">
          <div>
            <div id="chapterKicker" class="kicker"></div>
            <h2 id="chapterTitle"></h2>
          </div>
          <div class="headerRight">
            <div id="counter" class="pill">1 / 1</div>
            <div id="statusPill" class="pill status neutral">offen</div>
          </div>
        </div>

        <div class="toolbar panel">
          <div class="filterGroup">
            <button class="filterBtn active" data-filter="all">Alle</button>
            <button class="filterBtn" data-filter="open">Offen</button>
            <button class="filterBtn" data-filter="known">Gewusst</button>
            <button class="filterBtn" data-filter="review">Noch üben</button>
          </div>
          <div class="stats">
            <span id="statAll">Alle: 0</span>
            <span id="statOpen">Offen: 0</span>
            <span id="statKnown">Gewusst: 0</span>
            <span id="statReview">Noch üben: 0</span>
          </div>
        </div>

        <div class="cardRow">
          <button id="prevBtn" class="navBtn" aria-label="Vorherige Karte">◀</button>

          <button id="card" class="card" aria-label="Lernkarte drehen">
            <div class="cardInner">
              <article class="cardFace front">
                <div class="cardBadge">Vorderseite</div>
                <div id="qNumber" class="qNumber"></div>
                <div id="question" class="question"></div>
                <ol id="options" class="options"></ol>
                <div class="hint">Karte anklicken zum Umdrehen</div>
              </article>

              <article class="cardFace back">
                <div class="cardBadge">Rückseite</div>
                <div id="aNumber" class="qNumber"></div>
                <div id="aQuestion" class="question"></div>
                <div class="answerBox">
                  <div class="answerLabel">Richtige Antwort</div>
                  <div id="correct" class="correct"></div>
                </div>
                <div class="hint">Jetzt Karte bewerten oder weiterblättern</div>
              </article>
            </div>
          </button>

          <button id="nextBtn" class="navBtn" aria-label="Nächste Karte">▶</button>
        </div>

        <div class="bottomBar">
          <button id="prevBottom" class="secondaryBtn">⟵ Zurück</button>
          <button id="markKnown" class="primaryBtn known">✔ Gewusst</button>
          <button id="markReview" class="primaryBtn review">↺ Noch üben</button>
          <button id="clearMark" class="secondaryBtn">Markierung löschen</button>
          <button id="nextBottom" class="secondaryBtn">Weiter ⟶</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
